# yaml-language-server: $schema=https://tj-smith47.github.io/anodizer/schema.json
# brontes — transform any clap CLI into an MCP server.
#
# Library-only release: changelog → source tarball → cargo publish. No
# archives, signs, binaries, docker images or installer artifacts ship,
# because brontes does not produce a runnable binary in v0.1.0. The mcp:
# block is present but skipped — brontes itself is the library; consumers
# (anodizer, cfgd) register their brontes-powered servers on the MCP
# registry instead.

version: 2
project_name: brontes
dist: ./dist

env:
  - RELEASE_TYPE=stable

variables:
  repo_url: "https://github.com/tj-smith47/brontes"
  description: "Transform any clap CLI into an MCP server"

git:
  tag_sort: "-version:refname"
  prerelease_suffix: "-"

tag:
  # Conventional Commit drives the bump signal: `feat:` → minor, `fix:` /
  # `perf:` / `revert:` → patch, `BREAKING CHANGE` footer or `<type>!:`
  # shorthand → major. A range of only chore / docs / style / refactor /
  # test / build / ci commits no-ops, so autotag won't mint a spurious
  # patch bump after a documentation or test touch.
  default_bump: none
  branch_history: full
  tag_prefix: "v"
  release_branches:
    - master
  initial_version: "0.1.0"

metadata:
  description: "Transform any clap CLI into an MCP server"
  homepage: "https://github.com/tj-smith47/brontes"
  license: MIT
  maintainers:
    - "TJ Smith"
  mod_timestamp: "{{ CommitTimestamp }}"
  full_description:
    from_file: README.md
  commit_author:
    name: TJ Smith
    email: tj@jarvispro.io

before:
  hooks:
    - cargo fmt --check
    - cargo clippy --all-features --all-targets -- -W clippy::nursery -D warnings
    - cargo test

changelog:
  use: git
  title: "Changelog"
  header: "# Changelog for {{ ProjectName }}"
  divider: "---"
  sort: asc
  abbrev: 12
  format: "* {{ .SHA }} {{ .Message }} ({{ .AuthorUsername }})"
  paths:
    - "src/**"
    - "tests/**"
    - "examples/**"
    - "Cargo.toml"
    - "Cargo.lock"
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Refactors
      regexp: "^refactor"
      order: 3
    - title: Others
      order: 999
  footer: |
    _Generated by anodizer._

# Source tarball — gives downstream packagers and SBOM tools a stable
# artifact independent of the GitHub auto-generated "Source code (tar.gz)".
source:
  enabled: true
  format: tar.gz
  name_template: "{{ ProjectName }}-{{ Version }}-source"
  prefix_template: "{{ ProjectName }}-{{ Version }}/"
  # No `files:` — anodizer's source stage runs `git archive`, which already
  # captures every tracked file. Listing them here only ADDS duplicate tar
  # entries on top of the archive. List paths here solely to bundle UNtracked
  # extras (a generated man page, a build-time artifact); brontes has none.

# Source SBOM — brontes ships no binary, so the only artifact to catalog is
# the source tarball above. `artifacts: source` directs syft at the source
# archive (not the absent build outputs). Gives downstream consumers a
# CycloneDX bill of materials for the exact dependency closure the .crate
# was cut from, attached to the GitHub release alongside the tarball.
sboms:
  - id: source
    artifacts: source
    documents:
      - "{{ .ArtifactName }}.cdx.json"

# Signing — cosign keyless (Sigstore/Fulcio OIDC) signs the source tarball
# and its SBOM. Keyless reuses the `id-token: write` permission the release
# workflow already grants for MCP; no GPG/cosign key secret is required, so
# this adds no new provisioning. `if: not IsSnapshot` keeps local snapshot
# and `check config` runs from invoking cosign (which needs the GHA OIDC
# token only present in the release job).
signs:
  - id: source
    artifacts: source
    cmd: cosign
    args:
      - sign-blob
      - "--yes"
      - "--output-signature"
      - "{{ Signature }}"
      - "{{ Artifact }}"
    if: "{{ not IsSnapshot }}"

# Attestations — dogfood anodizer's emit-attestations feature. `emit` mode
# writes a self-contained in-toto SLSA-provenance v1 statement over the
# source tarball and its SBOM, attached to the GitHub release. Keyless like
# signs:, so it needs no new secret.
attestations:
  enabled: true
  mode: emit
  artifacts: [source, sbom]

# Crates.io publisher — auth is crates.io Trusted Publishing (OIDC); see the
# `auth: oidc` note below. 600s index timeout matches cfgd's setting to absorb
# sporadic crates.io 503s.
defaults:
  publish:
    cargo:
      index_timeout: 600
      # crates.io Trusted Publishing: `oidc` mints a short-lived crates.io
      # token from the release job's GitHub Actions id-token — no stored
      # CARGO_REGISTRY_TOKEN. It never falls back to a token, so a missing or
      # unregistered Trusted Publisher fails the release LOUDLY instead of
      # silently. Requires (a) the release job to grant `id-token: write` (see
      # release.yml) and (b) the crates.io Trusted-Publisher config registered
      # for this repo/workflow BEFORE the next release tag is cut.
      auth: oidc
      # A crates.io publish is a one-way door — never yank a version that
      # landed just because a LATER publisher in the run failed.
      retain_on_rollback: true

# On any failure, HOLD: leave the tag and partial release in place for a human
# to inspect, rather than reverting. release.yml is tag-triggered with no bump
# commit to undo, so a rollback's only action would be pushing a revert to
# protected master — which cannot roll back the already-pushed tag and risks a
# branch-protection/scope rejection that re-poisons the run.
release:
  on_failure: hold

# Single-crate library. `release.github.owner/name` pins the repository the
# changelog stage queries for the commit range.
crates:
  - name: brontes
    path: .
    tag_template: "v{{ Version }}"
    # Single-crate tag→manifest sync. Without this opt-in, `anodizer tag` cuts
    # the tag but leaves `[package].version` untouched, so cargo publish ships
    # the OLD version (already-immutable on crates.io) and the run fails the
    # content-vs-version skip-guard. `mode: tag` derives the version from the
    # computed tag and rewrites Cargo.toml in the bump commit the tag points at.
    # Requires the auto-tag step to pass `--crate brontes` (see ci.yml) so the
    # single-crate version-sync path is taken.
    version_sync:
      enabled: true
      mode: tag
    release:
      github:
        owner: tj-smith47
        name: brontes
      draft: false
      prerelease: auto
      make_latest: auto
      mode: keep-existing
      target_commitish: "{{ .Commit }}"
      # A re-cut of the same tag must adopt the prior attempt's draft/assets
      # instead of bailing on "asset already exists"; otherwise a single failed
      # publish wedges every subsequent run on the same version.
      replace_existing_draft: true
      replace_existing_artifacts: true
      name_template: "{{ ProjectName }} {{ Tag }}"
      header: |
        ## What's new in {{ .Tag }}
      footer: |
        ---
        Released with [anodizer](https://github.com/tj-smith47/anodizer) 🦀
    # crates.io is the ONLY artifact registry brontes ships to: it is a
    # library, so the published .crate tarball is the entire deliverable.
    # Presence under `publish:` opts the crate in; `index_timeout` is
    # inherited from `defaults.publish.cargo`. `--locked` pins the exact
    # Cargo.lock the CI build resolved so a transient registry shift can't
    # swap a dependency between verify and publish; `--all-features` keeps
    # the pre-publish verification build identical to what docs.rs renders
    # (`[package.metadata.docs.rs] all-features = true`).
    publish:
      cargo:
        locked: true
        all_features: true

# ───────────────────────────────────────────────────────────────────────
# EXAMPLE — `mcp:` block for a brontes-powered MCP server release
# ───────────────────────────────────────────────────────────────────────
#
# brontes has no active `mcp:` block on purpose. brontes is a *toolkit for
# building* MCP servers — a library compiled into a consumer's own binary —
# so it never runs as a server and has no downloadable server artifact to
# truthfully register (the MCP registry's package taxonomy is oci / npm /
# pypi / nuget / mcpb; there is no "cargo crate" entry). The live `mcp:`
# publisher belongs to a repo that actually ships a server: anodizer
# dogfoods it for real (`required: true`, OCI package
# `ghcr.io/tj-smith47/anodizer`, `auth: github-oidc`).
#
# The commented worked example below stays as copy-paste scaffolding for a
# downstream consumer (anodizer, cfgd, any clap CLI that mounts
# `brontes::command`) who DOES publish a runnable server. The README points
# consumers at this block via the "Releasing an MCP server" section.
#
# Uncomment, replace `your-mcp-server-name` with your reverse-DNS name,
# and edit the `packages[]` block to match how your server ships.
#
# Schema reference: anodizer's `crates/core/src/config/mcp.rs` (McpConfig).
# Docs: https://tj-smith47.github.io/anodizer/docs/publish/mcp-registry/
#
# mcp:
#   # Reverse-DNS name, exactly one `/` between namespace and server name.
#   # Required for the registry to accept the publish. Convention:
#   # `io.github.<your-gh-handle>/<server-name>`.
#   name: io.github.your-gh-handle/your-mcp-server-name
#
#   # Human-readable description (max 100 chars). Tera-templated.
#   description: "Short blurb shown in the MCP registry UI"
#
#   # Optional URL to the project homepage / docs site.
#   homepage: "https://github.com/your-gh-handle/your-mcp-server-name"
#
#   # Set to `true` to register the metadata block without publishing
#   # (useful for snapshot / dry-run releases). Tera-templated; the
#   # `disable:` alias is accepted for back-compat with GoReleaser configs.
#   # skip: "{{ .IsSnapshot }}"
#
#   # Repository the server's source lives in. `source: github` is the
#   # standard value; alternate values track the registry's `repository`
#   # taxonomy.
#   repository:
#     url: "https://github.com/your-gh-handle/your-mcp-server-name"
#     source: github
#
#   # One entry per package registry the server is available on. Pick the
#   # `registry_type` that matches how you actually ship:
#   #   - `mcpb`   — MCP Bundle (zip with manifest), uploaded as a GH
#   #                release asset; transport is whatever the bundle ships
#   #   - `oci`    — Docker / OCI image (requires the `dockers:` block
#   #                upstream so the image actually exists before publish)
#   #   - `npm`, `pypi`, `nuget` — language registries; identifier is the
#   #                published package name
#   # `identifier` is Tera-templated; `{{ .Version }}` is the release tag
#   # without the `v` prefix.
#   packages:
#     - registry_type: mcpb
#       identifier: "your-mcp-server-name@{{ .Version }}"
#       transport:
#         type: stdio        # or `streamable-http` for HTTP transport
#
#   # How anodizer authenticates to the MCP registry on publish. Pick one:
#   #   - `github-oidc` — GHA-native; requires `permissions: id-token: write`
#   #                     in the release workflow. No PAT needed.
#   #   - `github`      — exchanges a Personal Access Token (PAT) for a
#   #                     registry session; requires `GH_PAT` secret.
#   #   - `none`        — unauthenticated; only valid for registries that
#   #                     accept anonymous publish (rare; usually for
#   #                     internal/self-hosted registries).
#   auth:
#     type: github-oidc
