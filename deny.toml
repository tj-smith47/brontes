# cargo-deny config. Permissive on advisories during scaffold; tightened phase by phase.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    # MPL-2.0 is file-level copyleft and safe to consume from a permissive
    # binary; pulled in transitively via `dirs` -> `option-ext`.
    "MPL-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Duplicates that cannot be collapsed without forking an upstream crate.
# Each entry justifies WHY the dup exists and WHY no unifying version is
# reachable.
skip = [
    # `getrandom` 0.2.x vs 0.4.x
    # 0.2: pulled in by `ring 0.17` (the rustls TLS backend).
    # 0.4: pulled in by `rand`, `tempfile`, `uuid` (all current).
    # No unifying version exists: `ring` ships its own crypto and its
    # release cadence is glacial — moving off `getrandom 0.2` needs a new
    # `ring` release outside brontes' control. Re-evaluate when
    # `ring >= 0.18` lands.
    { name = "getrandom", version = "0.2" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
