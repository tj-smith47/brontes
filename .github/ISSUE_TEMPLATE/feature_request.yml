name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case? If you are integrating brontes into a `clap` CLI, describe the consumer.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Sketch the API surface (`Config`, `Middleware`, subcommands, etc.) if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered (different MCP transport, custom middleware, etc.).

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or `Config` examples.
