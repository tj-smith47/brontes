name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Read-only at the workflow level; the two writing jobs (`coverage`, `tag`)
# elevate to `contents: write` per-job. PR events from forks override the
# token with their own restricted one, so no fork PR gains write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  ANODIZER_VERSION: v0.22.1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

  msrv:
    name: msrv check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # Linux-only: single-toolchain check, no OS-gated code paths under MSRV.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -E '^rust-version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$msrv" >> "$GITHUB_OUTPUT"

      - name: Set up MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check against MSRV
        run: cargo check --all-features

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Linux-only: rustdoc emits HTML, output is OS-independent.
      - name: Build docs
        run: cargo doc --no-deps --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Linux-only: reads Cargo.lock, OS-independent advisory check.
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      # Linux-only: reads deny.toml + Cargo.lock, OS-independent policy check.
      - name: Run cargo deny
        run: cargo deny check

  # Coverage: master-only — runs cargo-llvm-cov, emits Cobertura XML, then
  # scripts/update-coverage-badge.sh extracts the line-rate and pushes a
  # shields.io-endpoint JSON to the orphan `badges` branch. README pulls
  # the badge from that branch.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write  # push shields-endpoint JSON to the `badges` branch
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --cobertura --output-path cobertura.xml

      - name: Update coverage badge
        run: bash scripts/update-coverage-badge.sh cobertura.xml

  # Auto-tag: on master only, after every other check passes, mint the next
  # tag via `anodizer tag --push-tags-only`, which pushes ONLY the tag —
  # pointing at the local version-sync bump commit — and leaves master where
  # it was. The tag push triggers .github/workflows/release.yml; that
  # workflow's `advance-master` job fast-forwards master onto the bump commit
  # ONLY after cargo publish succeeds, so a failed publish never advances the
  # branch (deferred-branch push pattern; matches anodizer's advance-master).
  #
  # Gate semantics: anodizer tag itself decides whether to mint a tag from
  # Conventional Commits in the range (default_bump: none in .anodizer.yaml
  # means a feat/fix/perf signal is required). A range of only chore/docs/
  # style/refactor/test commits no-ops cleanly.
  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, msrv, docs, audit, deny]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push the auto-tag (GH_PAT, so release.yml triggers)
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run anodizer tag
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: tag --push-tags-only --crate brontes
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
