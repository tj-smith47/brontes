name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  # Linux-only: single-toolchain check, no OS-gated code paths under MSRV.
  msrv:
    name: msrv check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -E '^rust-version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$msrv" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  # Linux-only: rustdoc emits HTML, output is OS-independent.
  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --all-features

  # Linux-only: reads Cargo.lock, OS-independent advisory check.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # Linux-only: reads deny.toml + Cargo.lock, OS-independent policy check.
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

  # Coverage: master-only — runs cargo-llvm-cov, emits Cobertura XML, then
  # the .claude/scripts/update-coverage-badge.sh script extracts the line-rate
  # and pushes a shields.io-endpoint JSON to the orphan `badges` branch.
  # README pulls the badge from that branch.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-coverage
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --cobertura --output-path cobertura.xml
      - name: Update coverage badge
        run: bash .claude/scripts/update-coverage-badge.sh cobertura.xml

  # Auto-tag: on master only, after every other check passes, mint the next
  # tag via `anodizer tag` and push it. Tag push triggers .github/workflows/release.yml.
  #
  # Gate semantics: anodizer tag itself decides whether to mint a tag from
  # Conventional Commits in the range (default_bump: none in .anodizer.yaml
  # means a feat/fix/perf signal is required). A range of only chore/docs/
  # style/refactor/test commits no-ops cleanly.
  tag:
    name: Auto-tag
    if: github.ref == 'refs/heads/master'
    needs: [fmt, clippy, test, msrv, docs, audit, deny]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT (not GITHUB_TOKEN) so the tag push triggers release.yml.
          # GITHUB_TOKEN-authored pushes don't trigger downstream workflows.
          token: ${{ secrets.GH_PAT }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run anodizer tag
        uses: tj-smith47/anodizer-action@v1
        with:
          version: v0.2.0
          args: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
