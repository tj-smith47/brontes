name: Release

on:
  push:
    tags:
      - "v*"

# Read-only at the workflow level; each job elevates to exactly what it writes.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ANODIZER_VERSION: v0.22.1

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GH release creation
      id-token: write  # crates.io Trusted Publishing (OIDC) + MCP registry
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # tag history + previous-tag lookup for changelog

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release

      # `publish.cargo.auth: oidc` in .anodizer.yaml mints a short-lived
      # crates.io token from this job's GitHub Actions id-token (Trusted
      # Publishing) — the `id-token: write` grant above makes that token
      # ambient. There is no CARGO_REGISTRY_TOKEN fallback: a missing or
      # unregistered Trusted Publisher fails the release loudly.
      - name: Run anodizer release
        uses: tj-smith47/anodizer-action@v1
        with:
          version: ${{ env.ANODIZER_VERSION }}
          args: release --clean
          auto-install: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  # Deferred-branch push: the tag was pushed alone (ci.yml `tag --push-tags-only`)
  # pointing at the local version-sync bump commit, leaving master unmoved.
  # Advance master onto that bump commit ONLY after the publish succeeds, so a
  # failed release never advances the branch (matches anodizer's advance-master).
  # `github.sha` on a tag-push is the commit the tag references = the bump commit;
  # `force=false` makes the GitHub API reject anything but a fast-forward, so the
  # branch moves only when master is a strict ancestor of the bump commit.
  advance-master:
    name: Advance master
    needs: [release]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write  # fast-forward the master ref onto the bump commit
    steps:
      - name: Fast-forward master onto the published bump commit
        env:
          # GH_PAT (not GITHUB_TOKEN): moving brontes' protected master ref
          # requires the same credential the tag push uses in ci.yml.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHA: ${{ github.sha }}
        run: |
          if ! gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/master" \
                 -f sha="$SHA" -F force=false; then
            echo "::error::Could not fast-forward master to $SHA (master moved during release?). \
              The version IS published — do NOT re-cut. Reconcile by hand: \
              git fetch origin && git push origin $SHA:refs/heads/master"
            exit 1
          fi
